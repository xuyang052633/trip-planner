<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ 请假旅游规划助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        h2 { color: #444; font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; background: #fff; color: #000; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); }
        
        .salary-info { background: #f8f9ff; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .salary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .salary-item { background: white; padding: 12px; border-radius: 8px; text-align: center; }
        .salary-item .value { font-size: 24px; font-weight: bold; color: #667eea; }
        .salary-item .label { font-size: 12px; color: #666; margin-top: 4px; }
        
        .dest-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
        .dest-card { background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 16px; cursor: pointer; }
        .dest-card:hover { border-color: #667eea; }
        .dest-card.selected { border-color: #667eea; background: #f0f4ff; }
        .dest-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .dest-name { font-weight: bold; }
        .dest-price { color: #e74c3c; font-weight: bold; }
        .dest-info { color: #666; font-size: 13px; }
        
        .flight-list, .hotel-list { margin-top: 16px; }
        .flight-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .flight-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .flight-airline { font-weight: bold; font-size: 16px; color: #333; }
        .flight-price { text-align: right; }
        .flight-price .amount { font-size: 28px; font-weight: bold; color: #e74c3c; }
        .flight-price .currency { font-size: 12px; color: #999; }
        .flight-route { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 12px; background: #f8f9fa; border-radius: 8px; }
        .flight-time { text-align: center; }
        .flight-time .time { font-size: 20px; font-weight: bold; color: #333; }
        .flight-time .airport { font-size: 12px; color: #666; }
        .flight-arrow { font-size: 24px; color: #667eea; }
        .flight-details { display: flex; gap: 20px; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #eee; font-size: 13px; color: #666; }
        .flight-detail-item { display: flex; align-items: center; gap: 6px; }
        
        .hotel-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; gap: 16px; }
        .hotel-image { width: 120px; height: 90px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; }
        .hotel-info { flex: 1; }
        .hotel-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .hotel-rating { color: #f39c12; font-size: 14px; }
        .hotel-amenities { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .amenity-tag { padding: 4px 8px; background: #f0f0f0; border-radius: 4px; font-size: 12px; color: #666; }
        .hotel-price { text-align: right; display: flex; flex-direction: column; justify-content: center; }
        
        .leave-info { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 16px; margin-top: 16px; }
        .leave-title { font-weight: bold; color: #856404; margin-bottom: 12px; }
        .leave-options { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
        .leave-option { padding: 10px 8px; background: white; border: 2px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; }
        .leave-option:hover { border-color: #667eea; }
        .leave-option.selected { border-color: #667eea; background: #f0f4ff; }
        .leave-option .hours { font-size: 14px; font-weight: bold; color: #333; }
        .leave-option .cost { font-size: 12px; color: #e74c3c; margin-top: 2px; }
        
        .leave-custom { margin-top: 16px; padding-top: 16px; border-top: 1px dashed #ccc; }
        .leave-custom label { display: inline-block; width: auto; margin-right: 10px; }
        .leave-custom input { width: 80px; display: inline-block; padding: 8px; }
        
        .plan-summary { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; padding: 20px; border-radius: 12px; margin-top: 16px; }
        .plan-row { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .plan-row:last-child { border-bottom: none; margin-bottom: 0; }
        
        .mock-badge { display: inline-block; padding: 4px 8px; background: #ffa500; color: white; border-radius: 4px; font-size: 12px; margin-left: 8px; }
        
        @media (max-width: 600px) {
            .dest-grid, .salary-grid, .leave-options { grid-template-columns: 1fr 1fr; }
            .row-3, .row-4 { grid-template-columns: 1fr; }
            .flight-route { flex-direction: column; gap: 10px; }
            .hotel-card { flex-direction: column; }
            .hotel-image { width: 100%; height: 120px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>✈️ 请假旅游规划助手</h1>
            <p class="subtitle">实时搜索机票酒店 · 智能规划最优行程</p>
            
            <h2>💰 基本信息</h2>
            <div class="row">
                <div class="form-group"><label>日薪（元）</label><input type="number" id="dailySalary" value="1600"></div>
                <div class="form-group"><label>工作时长（小时）</label><input type="number" id="workHours" value="8"></div>
            </div>
            
            <h2>🕐 工作时间段</h2>
            <div class="row-4">
                <div class="form-group"><label>上午开始</label><input type="time" id="amStart" value="08:30"></div>
                <div class="form-group"><label>上午结束</label><input type="time" id="amEnd" value="12:30"></div>
                <div class="form-group"><label>下午开始</label><input type="time" id="pmStart" value="14:00"></div>
                <div class="form-group"><label>下午结束</label><input type="time" id="pmEnd" value="18:00"></div>
            </div>
            
            <h2>🛫 出行信息</h2>
            <div class="row-3">
                <div class="form-group">
                    <label>出发城市</label>
                    <select id="fromCity">
                        <option value="深圳">深圳</option>
                        <option value="香港" selected>香港</option>
                        <option value="澳门">澳门</option>
                        <option value="广州">广州</option>
                    </select>
                </div>
                <div class="form-group"><label>出发日期</label><input type="date" id="departDate" value="2026-04-04"></div>
                <div class="form-group"><label>返程日期</label><input type="date" id="returnDate" value="2026-04-06"></div>
            </div>
            
            <h2>🛬 目的地</h2>
            <div class="dest-grid" id="destGrid"></div>
            
            <button class="btn" onclick="searchAll()" style="margin-top:20px">🔍 搜索机票和酒店</button>
        </div>
        
        <div class="card" id="salaryCard" style="display:none">
            <h2>💰 请假成本计算</h2>
            <div class="salary-info">
                <div class="salary-grid">
                    <div class="salary-item"><div class="value" id="hourlyRate">200</div><div class="label">元/小时</div></div>
                    <div class="salary-item"><div class="value" id="amCost">800</div><div class="label">上午(4h)</div></div>
                    <div class="salary-item"><div class="value" id="pmCost">800</div><div class="label">下午(4h)</div></div>
                    <div class="salary-item"><div class="value" id="fullDayCost">1600</div><div class="label">全天</div></div>
                </div>
            </div>
            
            <h2>📋 请假时长（小时级）</h2>
            <div class="leave-info">
                <div class="leave-title">选择请假时长：</div>
                <div class="leave-options" id="leaveOptions">
                    <div class="leave-option" onclick="selectLeave(0)"><div class="hours">0小时</div><div class="cost">¥0</div></div>
                    <div class="leave-option" onclick="selectLeave(2)"><div class="hours">2小时</div><div class="cost">¥400</div></div>
                    <div class="leave-option" onclick="selectLeave(4)"><div class="hours">4小时</div><div class="cost">¥800</div></div>
                    <div class="leave-option selected" onclick="selectLeave(8)"><div class="hours">1天</div><div class="cost">¥1600</div></div>
                    <div class="leave-option" onclick="selectLeave(16)"><div class="hours">2天</div><div class="cost">¥3200</div></div>
                    <div class="leave-option" onclick="selectLeave(24)"><div class="hours">3天</div><div class="cost">¥4800</div></div>
                </div>
                <div class="leave-custom">
                    <label>自定义请假：</label>
                    <input type="number" id="customHours" placeholder="小时" min="0" onchange="setCustomLeave()">
                    <span>小时 = ¥<span id="customCost">0</span></span>
                </div>
            </div>
        </div>
        
        <div class="card" id="flightCard" style="display:none">
            <h2>✈️ 机票搜索结果 <span class="mock-badge" id="flightBadge" style="display:none">模拟数据</span></h2>
            <div class="flight-list" id="flightList"></div>
        </div>
        
        <div class="card" id="hotelCard" style="display:none">
            <h2>🏨 酒店搜索结果 <span class="mock-badge" id="hotelBadge" style="display:none">模拟数据</span></h2>
            <div class="hotel-list" id="hotelList"></div>
        </div>
        
        <div class="card" id="planCard" style="display:none">
            <h2>📅 行程总览</h2>
            <div class="plan-summary" id="planSummary"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = '';
        
        const destinations = [
            { code: 'BKK', name: '曼谷', flag: '🇹🇭', visa: '落地签', time: '3小时', price: 900, airport: 'BKK' },
            { code: 'SGN', name: '胡志明', flag: '🇻🇳', visa: '电子签', time: '3小时', price: 800, airport: 'SGN' },
            { code: 'MNL', name: '马尼拉', flag: '🇵🇭', visa: '免签', time: '2.5小时', price: 700, airport: 'MNL' },
            { code: 'KUL', name: '吉隆坡', flag: '🇲🇾', visa: '免签', time: '4小时', price: 1000, airport: 'KUL' },
            { code: 'SIN', name: '新加坡', flag: '🇸🇬', visa: '免签', time: '4小时', price: 1200, airport: 'SIN' },
            { code: 'DPS', name: '巴厘岛', flag: '🇮🇩', visa: '落地签', time: '4小时', price: 1100, airport: 'DPS' },
            { code: 'HKT', name: '普吉岛', flag: '🇹🇭', visa: '落地签', time: '3.5小时', price: 850, airport: 'HKT' },
            { code: 'CNX', name: '清迈', flag: '🇹🇭', visa: '落地签', time: '3小时', price: 780, airport: 'CNX' },
            { code: 'HAN', name: '河内', flag: '🇻🇳', visa: '电子签', time: '2.5小时', price: 750, airport: 'HAN' },
            { code: 'DAD', name: '岘港', flag: '🇻🇳', visa: '电子签', time: '2.5小时', price: 850, airport: 'DAD' }
        ];
        
        const airlineNames = {
            'CX': '国泰航空', 'HX': '香港航空', 'AK': '亚洲航空', 'FD': '亚洲航空', 
            'VN': '越南航空', 'PR': '菲律宾航空', 'MH': '马航', 'SL': '狮航',
            'BR': '长荣航空', 'CI': '中华航空', 'UO': 'HK Express', 'Z2': '宿务航空'
        };
        
        let selectedDest = null;
        let selectedLeaveHours = 8;
        let flights = [];
        let hotels = [];
        
        window.onload = async () => {
            renderDestinations();
            calculateSalary();
            document.getElementById('dailySalary').addEventListener('input', calculateSalary);
            document.getElementById('workHours').addEventListener('input', calculateSalary);
            document.getElementById('amStart').addEventListener('change', calculateSalary);
            document.getElementById('amEnd').addEventListener('change', calculateSalary);
            document.getElementById('pmStart').addEventListener('change', calculateSalary);
            document.getElementById('pmEnd').addEventListener('change', calculateSalary);
        };
        
        function renderDestinations() {
            document.getElementById('destGrid').innerHTML = destinations.map(d => `
                <div class="dest-card" onclick="selectDest('${d.code}', this)">
                    <div class="dest-header">
                        <span class="dest-name">${d.flag} ${d.name}</span>
                        <span class="dest-price">¥${d.price}+</span>
                    </div>
                    <div class="dest-info">${d.visa} · ${d.time} · ${d.airport}</div>
                </div>
            `).join('');
        }
        
        function selectDest(code, el) {
            selectedDest = destinations.find(d => d.code === code);
            document.querySelectorAll('.dest-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }
        
        function calculateSalary() {
            const dailySalary = parseFloat(document.getElementById('dailySalary').value) || 1600;
            const workHours = parseFloat(document.getElementById('workHours').value) || 8;
            const hourlyRate = dailySalary / workHours;
            
            // 计算上午时长
            const amStart = document.getElementById('amStart').value;
            const amEnd = document.getElementById('amEnd').value;
            const pmStart = document.getElementById('pmStart').value;
            const pmEnd = document.getElementById('pmEnd').value;
            
            const amHours = calcHours(amStart, amEnd);
            const pmHours = calcHours(pmStart, pmEnd);
            
            const amCost = amHours * hourlyRate;
            const pmCost = pmHours * hourlyRate;
            
            document.getElementById('hourlyRate').textContent = hourlyRate.toFixed(0);
            document.getElementById('amCost').textContent = amCost.toFixed(0);
            document.getElementById('pmCost').textContent = pmCost.toFixed(0);
            document.getElementById('fullDayCost').textContent = dailySalary;
            
            // 更新请假选项
            document.querySelectorAll('.leave-option').forEach((opt, i) => {
                const hours = [0, 2, 4, 8, 16, 24][i];
                const cost = (hours / workHours) * dailySalary;
                opt.querySelector('.hours').textContent = hours >= 24 ? `${hours/24}天` : `${hours}小时`;
                opt.querySelector('.cost').textContent = '¥' + cost.toFixed(0);
            });
            
            document.getElementById('salaryCard').style.display = 'block';
        }
        
        function calcHours(start, end) {
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            return (eh * 60 + em - sh * 60 - sm) / 60;
        }
        
        function selectLeave(hours) {
            selectedLeaveHours = hours;
            document.querySelectorAll('.leave-option').forEach((opt, i) => {
                const h = [0, 2, 4, 8, 16, 24][i];
                opt.classList.toggle('selected', h === hours);
            });
            document.getElementById('customHours').value = '';
            updatePlan();
        }
        
        function setCustomLeave() {
            const hours = parseFloat(document.getElementById('customHours').value) || 0;
            selectedLeaveHours = hours;
            document.querySelectorAll('.leave-option').forEach(opt => opt.classList.remove('selected'));
            const dailySalary = parseFloat(document.getElementById('dailySalary').value) || 1600;
            const workHours = parseFloat(document.getElementById('workHours').value) || 8;
            document.getElementById('customCost').textContent = ((hours / workHours) * dailySalary).toFixed(0);
            updatePlan();
        }
        
        async function searchAll() {
            if (!selectedDest) { alert('请先选择一个目的地！'); return; }
            
            const fromCity = document.getElementById('fromCity').value;
            const departDate = document.getElementById('departDate').value;
            const returnDate = document.getElementById('returnDate').value;
            
            try {
                // 搜索机票
                const flightRes = await fetch(API_BASE + '/api/search-flights', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fromCity, toCity: selectedDest.name, date: departDate, returnDate })
                });
                const flightData = await flightRes.json();
                flights = flightData.flights || [];
                document.getElementById('flightBadge').style.display = flightData.isMock ? 'inline-block' : 'none';
                renderFlights();
                
                // 搜索酒店
                const hotelRes = await fetch(API_BASE + '/api/search-hotels', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ city: selectedDest.name, checkIn: departDate, checkOut: returnDate })
                });
                const hotelData = await hotelRes.json();
                hotels = hotelData.hotels || [];
                document.getElementById('hotelBadge').style.display = hotelData.isMock ? 'inline-block' : 'none';
                renderHotels();
                
            } catch (e) {
                console.error('搜索失败:', e);
                alert('搜索失败，请检查网络后重试');
            }
            
            document.getElementById('flightCard').style.display = 'block';
            document.getElementById('hotelCard').style.display = 'block';
            document.getElementById('planCard').style.display = 'block';
            updatePlan();
        }
        
        function renderFlights() {
            const list = document.getElementById('flightList');
            if (flights.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:40px;color:#666">未找到航班</div>';
                return;
            }
            
            const fromCity = document.getElementById('fromCity').value;
            const fromCode = { '深圳': 'SZX', '香港': 'HKG', '澳门': 'MFM', '广州': 'CAN' }[fromCity] || fromCity;
            
            list.innerHTML = flights.slice(0, 5).map(f => `
                <div class="flight-card">
                    <div class="flight-header">
                        <div class="flight-airline">
                            <span style="background:#667eea;color:white;padding:2px 8px;border-radius:4px;font-size:12px;margin-right:8px">${f.flightNumber || f.airline}</span>
                            ${f.airlineName || airlineNames[f.airline] || f.airline}
                        </div>
                        <div class="flight-price">
                            <div class="amount">¥${f.price}</div>
                            <div class="currency">${f.currency || 'CNY'}</div>
                        </div>
                    </div>
                    <div class="flight-route">
                        <div class="flight-time">
                            <div class="time">${f.departTime}</div>
                            <div class="airport">${f.departAirport || fromCode}</div>
                        </div>
                        <div class="flight-arrow">✈️</div>
                        <div class="flight-time">
                            <div class="time">${f.arriveTime}</div>
                            <div class="airport">${f.arriveAirport || selectedDest.airport}</div>
                        </div>
                    </div>
                    <div class="flight-details">
                        <div class="flight-detail-item">⏱️ ${f.duration || '3h'}</div>
                        <div class="flight-detail-item">${f.stops === 0 ? '✅ 直飞' : `🔄 ${f.stops}程中转`}</div>
                        <div class="flight-detail-item">💺 ${f.cabin || '经济舱'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderHotels() {
            const list = document.getElementById('hotelList');
            if (hotels.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:40px;color:#666">未找到酒店</div>';
                return;
            }
            
            list.innerHTML = hotels.slice(0, 4).map(h => `
                <div class="hotel-card">
                    <div class="hotel-image">🏨</div>
                    <div class="hotel-info">
                        <div class="hotel-name">${h.name}</div>
                        <div class="hotel-rating">${'⭐'.repeat(Math.floor(h.rating))} ${h.rating}</div>
                        <div class="hotel-amenities">${(h.amenities || []).map(a => `<span class="amenity-tag">${a}</span>`).join('')}</div>
                    </div>
                    <div class="hotel-price">
                        <div class="amount">¥${h.price}</div>
                        <div class="currency">/晚</div>
                    </div>
                </div>
            `).join('');
        }
        
        function updatePlan() {
            const dailySalary = parseFloat(document.getElementById('dailySalary').value) || 1600;
            const workHours = parseFloat(document.getElementById('workHours').value) || 8;
            const departDate = document.getElementById('departDate').value;
            const returnDate = document.getElementById('returnDate').value;
            
            const depart = new Date(departDate);
            const ret = new Date(returnDate);
            const tripDays = Math.ceil((ret - depart) / (1000 * 60 * 60 * 24)) + 1;
            
            const leaveCost = (selectedLeaveHours / workHours) * dailySalary;
            const totalLeaveDays = selectedLeaveHours / workHours;
            
            const flightPrice = flights[0]?.price || selectedDest?.price || 1000;
            const hotelPrice = hotels[0]?.price || 400;
            
            const totalFlight = flightPrice * 2;
            const totalHotel = hotelPrice * (tripDays - 1);
            const total = totalFlight + totalHotel + leaveCost;
            
            document.getElementById('planSummary').innerHTML = `
                <div class="plan-row"><span>🛫 往返机票</span><span>¥${totalFlight}</span></div>
                <div class="plan-row"><span>🏨 ${tripDays - 1}晚酒店</span><span>¥${totalHotel}</span></div>
                <div class="plan-row"><span>💼 请假扣薪 (${selectedLeaveHours}小时)</span><span>¥${leaveCost.toFixed(0)}</span></div>
                <div class="plan-row" style="font-size:18px;font-weight:bold"><span>💰 总费用</span><span>¥${total.toFixed(0)}</span></div>
                <div class="plan-row" style="border:none;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.3)">
                    <span>📅 总假期: ${(tripDays + totalLeaveDays).toFixed(1)}天 (旅行${tripDays}天 + 请假${totalLeaveDays.toFixed(1)}天)</span>
                </div>
            `;
        }
    </script>
</body>
</html>
