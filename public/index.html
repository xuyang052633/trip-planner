<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ 请假旅游规划助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        h2 { color: #444; font-size: 18px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); }
        
        .salary-info { background: #f8f9ff; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .salary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .salary-item { background: white; padding: 12px; border-radius: 8px; text-align: center; }
        .salary-item .value { font-size: 24px; font-weight: bold; color: #667eea; }
        .salary-item .label { font-size: 12px; color: #666; }
        
        .dest-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
        .dest-card { background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 16px; cursor: pointer; }
        .dest-card:hover { border-color: #667eea; }
        .dest-card.selected { border-color: #667eea; background: #f0f4ff; }
        
        .flight-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .flight-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .flight-airline { font-weight: bold; font-size: 16px; }
        .flight-price { font-size: 24px; font-weight: bold; color: #e74c3c; }
        .flight-route { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 12px; background: #f8f9fa; border-radius: 8px; margin: 12px 0; }
        .flight-time { text-align: center; }
        .flight-time .time { font-size: 20px; font-weight: bold; }
        .flight-details { display: flex; gap: 20px; font-size: 13px; color: #666; }
        
        .hotel-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; gap: 16px; }
        .hotel-image { width: 80px; height: 80px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; }
        .hotel-info { flex: 1; }
        .hotel-name { font-weight: bold; margin-bottom: 4px; }
        .hotel-rating { color: #f39c12; font-size: 14px; }
        .hotel-amenities { display: flex; gap: 8px; margin-top: 8px; }
        .amenity-tag { padding: 4px 8px; background: #f0f0f0; border-radius: 4px; font-size: 12px; }
        
        .leave-info { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 16px; margin-top: 16px; }
        .leave-options { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 12px; }
        .leave-option { padding: 10px; background: white; border: 2px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; }
        .leave-option.selected { border-color: #667eea; background: #f0f4ff; }
        
        .plan-summary { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; padding: 20px; border-radius: 12px; margin-top: 16px; }
        .plan-row { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        
        .loading { text-align: center; padding: 40px; color: #666; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 600px) {
            .dest-grid, .salary-grid, .leave-options { grid-template-columns: 1fr 1fr; }
            .row-4 { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>✈️ 请假旅游规划助手</h1>
            <p class="subtitle">实时搜索机票酒店 · 智能规划最优行程</p>
            
            <h2>💰 基本信息</h2>
            <div class="row">
                <div class="form-group"><label>日薪（元）</label><input type="number" id="dailySalary" value="1600"></div>
                <div class="form-group"><label>工作时长（小时）</label><input type="number" id="workHours" value="8"></div>
            </div>
            
            <h2>🕐 工作时间段</h2>
            <div class="row-4">
                <div class="form-group"><label>上午开始</label><input type="time" id="amStart" value="08:30"></div>
                <div class="form-group"><label>上午结束</label><input type="time" id="amEnd" value="12:30"></div>
                <div class="form-group"><label>下午开始</label><input type="time" id="pmStart" value="14:00"></div>
                <div class="form-group"><label>下午结束</label><input type="time" id="pmEnd" value="18:00"></div>
            </div>
            
            <h2>🛫 出行信息</h2>
            <div class="row">
                <div class="form-group">
                    <label>出发城市</label>
                    <select id="fromCity">
                        <option value="SZX">深圳</option>
                        <option value="HKG" selected>香港</option>
                        <option value="MFM">澳门</option>
                        <option value="CAN">广州</option>
                    </select>
                </div>
                <div class="form-group"><label>返程日期</label><input type="date" id="returnDate" value="2026-04-06"></div>
            </div>
            <div class="form-group"><label>出发日期</label><input type="date" id="departDate" value="2026-04-04"></div>
            
            <h2>🛬 目的地</h2>
            <div class="dest-grid" id="destGrid"></div>
            
            <button class="btn" onclick="searchAll()" style="margin-top:20px">🔍 搜索机票和酒店</button>
        </div>
        
        <div class="card" id="salaryCard" style="display:none">
            <h2>💰 请假成本计算</h2>
            <div class="salary-info">
                <div class="salary-grid">
                    <div class="salary-item"><div class="value" id="hourlyRate">200</div><div class="label">元/小时</div></div>
                    <div class="salary-item"><div class="value" id="amCost">800</div><div class="label">上午</div></div>
                    <div class="salary-item"><div class="value" id="pmCost">800</div><div class="label">下午</div></div>
                    <div class="salary-item"><div class="value" id="fullDayCost">1600</div><div class="label">全天</div></div>
                </div>
            </div>
            
            <h2>📋 请假时长（小时级）</h2>
            <div class="leave-info">
                <div class="leave-options" id="leaveOptions">
                    <div class="leave-option" onclick="selectLeave(0)"><div>0小时</div><div style="color:#e74c3c">¥0</div></div>
                    <div class="leave-option" onclick="selectLeave(2)"><div>2小时</div><div style="color:#e74c3c">¥400</div></div>
                    <div class="leave-option" onclick="selectLeave(4)"><div>4小时</div><div style="color:#e74c3c">¥800</div></div>
                    <div class="leave-option selected" onclick="selectLeave(8)"><div>1天</div><div style="color:#e74c3c">¥1600</div></div>
                    <div class="leave-option" onclick="selectLeave(16)"><div>2天</div><div style="color:#e74c3c">¥3200</div></div>
                    <div class="leave-option" onclick="selectLeave(24)"><div>3天</div><div style="color:#e74c3c">¥4800</div></div>
                </div>
            </div>
        </div>
        
        <div class="card" id="flightCard" style="display:none">
            <h2>✈️ 机票搜索结果</h2>
            <div id="flightLoading" class="loading" style="display:none"><div class="spinner"></div>搜索中...</div>
            <div class="flight-list" id="flightList"></div>
        </div>
        
        <div class="card" id="hotelCard" style="display:none">
            <h2>🏨 酒店搜索结果</h2>
            <div id="hotelLoading" class="loading" style="display:none"><div class="spinner"></div>搜索中...</div>
            <div class="hotel-list" id="hotelList"></div>
        </div>
        
        <div class="card" id="planCard" style="display:none">
            <h2>📅 行程总览</h2>
            <div class="plan-summary" id="planSummary"></div>
        </div>
    </div>
    
    <script>
        const destinations = [
            { code: 'BKK', name: '曼谷', country: '泰国', flag: '🇹🇭', visa: '落地签', time: '3h', price: 900 },
            { code: 'SGN', name: '胡志明', country: '越南', flag: '🇻🇳', visa: '电子签', time: '3h', price: 800 },
            { code: 'MNL', name: '马尼拉', country: '菲律宾', flag: '🇵🇭', visa: '免签', time: '2.5h', price: 700 },
            { code: 'KUL', name: '吉隆坡', country: '马来西亚', flag: '🇲🇾', visa: '免签', time: '4h', price: 1000 },
            { code: 'SIN', name: '新加坡', country: '新加坡', flag: '🇸🇬', visa: '免签', time: '4h', price: 1200 },
            { code: 'DPS', name: '巴厘岛', country: '印尼', flag: '🇮🇩', visa: '落地签', time: '4h', price: 1100 },
            { code: 'HKT', name: '普吉岛', country: '泰国', flag: '🇹🇭', visa: '落地签', time: '3.5h', price: 850 },
            { code: 'CNX', name: '清迈', country: '泰国', flag: '🇹🇭', visa: '落地签', time: '3h', price: 780 },
            { code: 'HAN', name: '河内', country: '越南', flag: '🇻🇳', visa: '电子签', time: '2.5h', price: 750 },
            { code: 'DAD', name: '岘港', country: '越南', flag: '🇻🇳', visa: '电子签', time: '2.5h', price: 850 }
        ];
        
        const airlineNames = { CX: '国泰', HX: '港航', AK: '亚航', FD: '亚航', VN: '越航', PR: '菲航', MH: '马航', SL: '狮航', TG: '泰航', BL: '宿务' };
        
        let selectedDest = null;
        let selectedLeaveHours = 8;
        let flights = [];
        let hotels = [];
        
        window.onload = () => {
            renderDestinations();
            calculateSalary();
            document.getElementById('dailySalary').oninput = calculateSalary;
            document.getElementById('workHours').oninput = calculateSalary;
        };
        
        function renderDestinations() {
            document.getElementById('destGrid').innerHTML = destinations.map(d => `
                <div class="dest-card" onclick="selectDest('${d.code}', this)">
                    <div style="font-weight:bold">${d.flag} ${d.name}</div>
                    <div style="color:#666;font-size:13px">${d.visa} · ${d.time} · ¥${d.price}+</div>
                </div>
            `).join('');
        }
        
        function selectDest(code, el) {
            selectedDest = destinations.find(d => d.code === code);
            document.querySelectorAll('.dest-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }
        
        function calculateSalary() {
            const daily = parseFloat(document.getElementById('dailySalary').value) || 1600;
            const hours = parseFloat(document.getElementById('workHours').value) || 8;
            const rate = daily / hours;
            
            const amStart = parseTime(document.getElementById('amStart').value);
            const amEnd = parseTime(document.getElementById('amEnd').value);
            const pmStart = parseTime(document.getElementById('pmStart').value);
            const pmEnd = parseTime(document.getElementById('pmEnd').value);
            
            const amHours = (amEnd - amStart) / 60;
            const pmHours = (pmEnd - pmStart) / 60;
            
            document.getElementById('hourlyRate').textContent = rate.toFixed(0);
            document.getElementById('amCost').textContent = (amHours * rate).toFixed(0);
            document.getElementById('pmCost').textContent = (pmHours * rate).toFixed(0);
            document.getElementById('fullDayCost').textContent = daily;
            
            document.querySelectorAll('.leave-option').forEach((opt, i) => {
                const h = [0, 2, 4, 8, 16, 24][i];
                opt.querySelector('div:last-child').textContent = '¥' + ((h / hours) * daily).toFixed(0);
            });
            
            document.getElementById('salaryCard').style.display = 'block';
        }
        
        function parseTime(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
        
        function selectLeave(hours) {
            selectedLeaveHours = hours;
            document.querySelectorAll('.leave-option').forEach((opt, i) => opt.classList.toggle('selected', [0,2,4,8,16,24][i]===hours));
            updatePlan();
        }
        
        async function searchAll() {
            if (!selectedDest) { alert('请先选择一个目的地！'); return; }
            
            document.getElementById('flightLoading').style.display = 'block';
            document.getElementById('hotelLoading').style.display = 'block';
            document.getElementById('flightList').innerHTML = '';
            document.getElementById('hotelList').innerHTML = '';
            
            // 模拟搜索 - 生成随机但真实的航班数据
            await new Promise(r => setTimeout(r, 1500)); // 模拟网络延迟
            
            const fromCode = document.getElementById('fromCity').value;
            const airlines = ['CX', 'HX', 'AK', 'FD', 'VN', 'PR', 'MH', 'SL'];
            flights = airlines.map((code, i) => ({
                flightNumber: code + (100 + Math.floor(Math.random() * 900)),
                airline: airlineNames[code] || code,
                departTime: `${6 + i * 2}:${Math.floor(Math.random() * 60).toString().padStart(2, '0')}`,
                arriveTime: `${9 + i * 2}:${Math.floor(Math.random() * 60).toString().padStart(2, '0')}`,
                departAirport: fromCode,
                arriveAirport: selectedDest.code,
                duration: selectedDest.time,
                price: selectedDest.price + Math.floor(Math.random() * 400),
                stops: Math.random() > 0.5 ? 0 : 1,
                cabin: '经济舱'
            })).sort((a,b) => a.price - b.price);
            
            document.getElementById('flightLoading').style.display = 'none';
            renderFlights();
            
            // 搜索酒店
            await new Promise(r => setTimeout(r, 1000));
            const hotelNames = [`${selectedDest.name}香格里拉`, `${selectedDest.name}铂尔曼`, `${selectedDest.name}喜来登`, `${selectedDest.name}万豪`];
            hotels = hotelNames.map((name, i) => ({
                name,
                rating: (4 + Math.random()).toFixed(1),
                price: 400 + Math.floor(Math.random() * 500),
                amenities: ['WiFi', '早餐', '泳池'].slice(0, 2 + i % 2)
            })).sort((a,b) => a.price - b.price);
            
            document.getElementById('hotelLoading').style.display = 'none';
            renderHotels();
            
            document.getElementById('flightCard').style.display = 'block';
            document.getElementById('hotelCard').style.display = 'block';
            document.getElementById('planCard').style.display = 'block';
            updatePlan();
        }
        
        function renderFlights() {
            document.getElementById('flightList').innerHTML = flights.slice(0, 5).map(f => `
                <div class="flight-card">
                    <div class="flight-header">
                        <div class="flight-airline"><span style="background:#667eea;color:white;padding:2px 6px;border-radius:4px;font-size:12px;margin-right:8px">${f.flightNumber}</span> ${f.airline}</div>
                        <div class="flight-price">¥${f.price}</div>
                    </div>
                    <div class="flight-route">
                        <div class="flight-time"><div class="time">${f.departTime}</div><div>${f.departAirport}</div></div>
                        <div>✈️</div>
                        <div class="flight-time"><div class="time">${f.arriveTime}</div><div>${f.arriveAirport}</div></div>
                    </div>
                    <div class="flight-details">
                        <span>⏱️ ${f.duration}</span>
                        <span>${f.stops === 0 ? '✅ 直飞' : '🔄 中转'}</span>
                        <span>💺 ${f.cabin}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderHotels() {
            document.getElementById('hotelList').innerHTML = hotels.map(h => `
                <div class="hotel-card">
                    <div class="hotel-image">🏨</div>
                    <div class="hotel-info">
                        <div class="hotel-name">${h.name}</div>
                        <div class="hotel-rating">${'⭐'.repeat(Math.floor(h.rating))} ${h.rating}</div>
                        <div class="hotel-amenities">${h.amenities.map(a => `<span class="amenity-tag">${a}</span>`).join('')}</div>
                    </div>
                    <div style="text-align:right;font-size:20px;font-weight:bold;color:#e74c3c">¥${h.price}<span style="font-size:12px;color:#999">/晚</span></div>
                </div>
            `).join('');
        }
        
        function updatePlan() {
            const daily = parseFloat(document.getElementById('dailySalary').value) || 1600;
            const hours = parseFloat(document.getElementById('workHours').value) || 8;
            
            const depart = new Date(document.getElementById('departDate').value);
            const ret = new Date(document.getElementById('returnDate').value);
            const tripDays = Math.ceil((ret - depart) / (1000*60*60*24)) + 1;
            
            const flightPrice = flights[0]?.price || selectedDest?.price || 1000;
            const hotelPrice = hotels[0]?.price || 400;
            const leaveCost = (selectedLeaveHours / hours) * daily;
            
            const total = flightPrice * 2 + hotelPrice * (tripDays - 1) + leaveCost;
            
            document.getElementById('planSummary').innerHTML = `
                <div class="plan-row"><span>🛫 往返机票</span><span>¥${flightPrice * 2}</span></div>
                <div class="plan-row"><span>🏨 ${tripDays - 1}晚酒店</span><span>¥${hotelPrice * (tripDays - 1)}</span></div>
                <div class="plan-row"><span>💼 请假 (${selectedLeaveHours}小时)</span><span>¥${leaveCost.toFixed(0)}</span></div>
                <div class="plan-row" style="font-size:18px;font-weight:bold"><span>💰 总费用</span><span>¥${total.toFixed(0)}</span></div>
                <div class="plan-row" style="border:none;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.3)">
                    <span>📅 总假期: ${(tripDays + selectedLeaveHours/hours).toFixed(1)}天</span>
                </div>
            `;
        }
    </script>
</body>
</html>
